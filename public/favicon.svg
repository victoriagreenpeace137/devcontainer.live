<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Define Gradients -->
  <defs>
    <!-- Top face gradient: vibrant purple -->
    <linearGradient id="topGradient" x1="24" y1="12" x2="24" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Side face gradient: medium purple with depth -->
    <linearGradient id="sideGradient" x1="28" y1="20" x2="28" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#5b21b6" />
    </linearGradient>
    <!-- End face gradient: darker purple -->
    <linearGradient id="endGradient" x1="12" y1="20" x2="12" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Container Isometric Shape (Elongated) -->
  <g filter="url(#glow)">
    <!-- Top Face -->
    <path d="M6 22L22 14L42 24L26 32L6 22Z" fill="url(#topGradient)" />
    
    <!-- Long Side Face (Front-Right) -->
    <path d="M26 32L42 24V36L26 44V32Z" fill="url(#sideGradient)" />
    
    <!-- Short Side Face (Front-Left) -->
    <path d="M6 22L26 32V44L6 34V22Z" fill="url(#endGradient)" />

    <!-- Corner/Edge Highlights -->
    <path d="M26 32V44" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.6" />
    <path d="M6 22L26 32L42 24" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.4" />

    <!-- Ribs/Corrugation (Short Face) - 3 bars -->
    <path d="M12 25.5V37.5M19 29V41" stroke="#4c1d95" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round" />
    
    <!-- Ribs/Corrugation (Long Side) - 5 bars -->
    <path d="M30 33.5V41.5M34 31.5V39.5M38 29.5V37.5" stroke="#4c1d95" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round" />
  </g>
</svg>